kind: Connector
version: v2
definition:
  name: mailkite_pgsql
  subgraph: mailkite
  source: hasura/postgres:v3.1.0
  context: .
  envMapping:
    CONNECTION_URI:
      fromEnv: MAILKITE_MAILKITE_PGSQL_CONNECTION_URI
    HASURA_CONNECTOR_PORT:
      fromEnv: MAILKITE_MAILKITE_PGSQL_HASURA_CONNECTOR_PORT
    HASURA_SERVICE_TOKEN_SECRET:
      fromEnv: MAILKITE_MAILKITE_PGSQL_HASURA_SERVICE_TOKEN_SECRET
    OTEL_EXPORTER_OTLP_ENDPOINT:
      fromEnv: MAILKITE_MAILKITE_PGSQL_OTEL_EXPORTER_OTLP_ENDPOINT
    OTEL_SERVICE_NAME:
      fromEnv: MAILKITE_MAILKITE_PGSQL_OTEL_SERVICE_NAME
