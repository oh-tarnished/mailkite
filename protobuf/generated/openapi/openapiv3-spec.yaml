openapi: 3.0.0
info:
  title: mailkite API
  summary: Scheduling, availability, and booking platform API.
  description: 'mailkite is a scheduling platform that exposes resources, schedules,
    availability windows, bookings, organisations, and promotional codes over a RESTful,
    OpenAPI-described surface. This document is generated from Protocol Buffer service
    definitions and merged into a single specification.


    Authentication is performed via bearer tokens unless otherwise noted. All timestamps
    are RFC 3339 and all monetary amounts follow the associated currency''s minor
    units.'
  version: 1.0.0
  termsOfService: https://mailkite.oh-tarnished.dev/terms
  contact:
    name: mailkite API Support
    url: https://mailkite.oh-tarnished.dev/support
    email: support@oh-tarnished.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: mailkite API documentation
  url: https://mailkite.oh-tarnished.dev/docs
servers:
- url: https://mailkite.oh-tarnished.dev
  description: Production
- url: https://staging.mailkite.oh-tarnished.dev
  description: Staging
- url: http://localhost:8080
  description: Local development
security:
- bearerAuth: []
tags:
- name: Bounce Service
- name: Campaign Service
- name: Mailing List Service
- name: Media Service
- name: Subscriber Service
- name: Template Service
- name: Transactional Service
paths:
  /v1/bounces:
    get:
      tags:
      - Bounce Service
      description: Lists recorded bounces.
      operationId: BounceService_ListBounces
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of bounces to return. The server may cap this.\
          \ When unset,\n the server picks a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: "A page token received from a previous ListBounces call. Provide\
          \ this to\n retrieve the subsequent page."
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression restricting which bounces are returned. Supports\
          \ the\n `campaign` and `source` fields, e.g. `campaign = \"campaigns/7\"\
          ` or\n `source = \"webhook\"`."
        schema:
          type: string
      - name: orderBy
        in: query
        description: "Comma-separated list of fields to sort by, each optionally suffixed\
          \ with\n ` desc` (e.g. `create_time desc`)."
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBouncesResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Bounces
  /v1/bounces/{bounce}:
    get:
      tags:
      - Bounce Service
      description: Gets a single bounce.
      operationId: BounceService_GetBounce
      parameters:
      - name: bounce
        in: path
        description: The bounce id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bounce'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Bounce
    delete:
      tags:
      - Bounce Service
      description: Deletes a bounce.
      operationId: BounceService_DeleteBounce
      parameters:
      - name: bounce
        in: path
        description: The bounce id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Bounce
  /v1/campaigns:
    get:
      tags:
      - Campaign Service
      description: Lists campaigns.
      operationId: CampaignService_ListCampaigns
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of campaigns to return. The server may cap this.\
          \ When unset,\n the server picks a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: "A page token received from a previous ListCampaigns call. Provide\
          \ this to\n retrieve the subsequent page."
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression restricting which campaigns are returned.\
          \ Supports\n free-text matching on `display_name`/`subject` and matching\
          \ against\n `state` and `tags`, e.g. `state = CAMPAIGN_STATE_RUNNING`."
        schema:
          type: string
      - name: orderBy
        in: query
        description: "Comma-separated list of fields to sort by, each optionally suffixed\
          \ with\n ` desc` (e.g. `create_time desc`)."
        schema:
          type: string
      - name: view
        in: query
        description: How much of each campaign to return. BASIC omits the large body
          fields.
        schema:
          type: integer
          format: enum
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCampaignsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Campaigns
    post:
      tags:
      - Campaign Service
      description: Creates a campaign.
      operationId: CampaignService_CreateCampaign
      parameters:
      - name: campaignId
        in: query
        description: "Optional client-specified ID for the campaign, used as the `{campaign}`\n\
          \ segment of its resource name. The server assigns one when omitted."
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Campaign
  /v1/campaigns/{campaign}:
    get:
      tags:
      - Campaign Service
      description: Gets a single campaign.
      operationId: CampaignService_GetCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      - name: view
        in: query
        description: How much of the campaign to return. BASIC omits the body fields.
        schema:
          type: integer
          format: enum
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Campaign
    delete:
      tags:
      - Campaign Service
      description: Deletes a campaign.
      operationId: CampaignService_DeleteCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Campaign
    patch:
      tags:
      - Campaign Service
      description: Updates a campaign.
      operationId: CampaignService_UpdateCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
        description: Fields to overwrite. Omit to replace all mutable fields.
        schema:
          type: string
          format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Campaign
  /v1/campaigns/{campaign}:preview:
    get:
      tags:
      - Campaign Service
      description: Renders the HTML preview of a campaign.
      operationId: CampaignService_PreviewCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewCampaignResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Preview Campaign
  /v1/campaigns/{campaign}:test:
    post:
      tags:
      - Campaign Service
      description: Sends a test of a campaign to specific addresses.
      operationId: CampaignService_TestCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestCampaignRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCampaignResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Test Campaign
  /v1/campaigns/{campaign}:transition:
    post:
      tags:
      - Campaign Service
      description: Transitions a campaign's lifecycle (start, pause, resume, cancel,
        schedule).
      operationId: CampaignService_TransitionCampaign
      parameters:
      - name: campaign
        in: path
        description: The campaign id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCampaignRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Transition Campaign
  /v1/campaigns:collectCampaignStats:
    get:
      tags:
      - Campaign Service
      description: Returns live stats for running campaigns.
      operationId: CampaignService_CollectCampaignStats
      parameters:
      - name: names
        in: query
        description: "Campaigns to fetch live stats for. Defaults to all running campaigns.\n\
          \ Format: campaigns/{campaign}"
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectCampaignStatsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Collect Campaign Stats
  /v1/mailingLists:
    get:
      tags:
      - Mailing List Service
      description: Lists mailing lists.
      operationId: MailingListService_ListMailingLists
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of lists to return. The server may cap this.\
          \ When unset, the\n server picks a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: "A page token received from a previous ListMailingLists call.\
          \ Provide this to\n retrieve the subsequent page."
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression restricting which lists are returned. Supports\
          \ free-text\n matching on `display_name` and matching against `type`, `optin`,\
          \ and `tags`."
        schema:
          type: string
      - name: orderBy
        in: query
        description: "Comma-separated list of fields to sort by, each optionally suffixed\
          \ with\n ` desc` (e.g. `display_name desc`)."
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMailingListsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Mailing Lists
    post:
      tags:
      - Mailing List Service
      description: Creates a mailing list.
      operationId: MailingListService_CreateMailingList
      parameters:
      - name: mailingListId
        in: query
        description: "Optional client-specified ID for the list, used as the `{mailing_list}`\n\
          \ segment of its resource name. The server assigns one when omitted."
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MailingList'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailingList'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Mailing List
  /v1/mailingLists/{mailingList}:
    get:
      tags:
      - Mailing List Service
      description: Gets a single mailing list.
      operationId: MailingListService_GetMailingList
      parameters:
      - name: mailingList
        in: path
        description: The mailingList id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailingList'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Mailing List
    delete:
      tags:
      - Mailing List Service
      description: Deletes a mailing list.
      operationId: MailingListService_DeleteMailingList
      parameters:
      - name: mailingList
        in: path
        description: The mailingList id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Mailing List
    patch:
      tags:
      - Mailing List Service
      description: Updates a mailing list.
      operationId: MailingListService_UpdateMailingList
      parameters:
      - name: mailingList
        in: path
        description: The mailingList id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
        description: Fields to overwrite. Omit to replace all mutable fields.
        schema:
          type: string
          format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MailingList'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailingList'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Mailing List
  /v1/media:
    get:
      tags:
      - Media Service
      description: Lists uploaded media.
      operationId: MediaService_ListMedia
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of media objects to return. The server may cap\
          \ this. When\n unset, the server picks a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: "A page token received from a previous ListMedia call. Provide\
          \ this to\n retrieve the subsequent page."
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression restricting which media are returned. Supports\
          \ free-text\n matching against the `filename` field."
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMediaResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Media
  /v1/media/{media}:
    get:
      tags:
      - Media Service
      description: Gets a single media object.
      operationId: MediaService_GetMedia
      parameters:
      - name: media
        in: path
        description: The media id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Media
    delete:
      tags:
      - Media Service
      description: Deletes a media asset.
      operationId: MediaService_DeleteMedia
      parameters:
      - name: media
        in: path
        description: The media id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Media
  /v1/media:upload:
    post:
      tags:
      - Media Service
      description: Uploads a media asset.
      operationId: MediaService_UploadMedia
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadMediaRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadMediaResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Upload Media
  /v1/subscribers:
    get:
      tags:
      - Subscriber Service
      description: Lists subscribers, optionally filtered by an advanced SQL query.
      operationId: SubscriberService_ListSubscribers
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of subscribers to return. The server may cap\
          \ this. When\n unset, the server picks a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: "A page token received from a previous ListSubscribers call.\
          \ Provide this to\n retrieve the subsequent page."
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression restricting which subscribers are returned.\
          \ Supports a\n raw SQL-expression over subscriber columns and attributes\
          \ (mirroring\n Listmonk's advanced query box), plus `lists` membership and\
          \ per-list\n `subscription_state` predicates."
        schema:
          type: string
      - name: orderBy
        in: query
        description: "Comma-separated list of fields to sort by, each optionally suffixed\
          \ with\n ` desc` (e.g. `create_time desc`)."
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubscribersResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Subscribers
    post:
      tags:
      - Subscriber Service
      description: Creates a subscriber.
      operationId: SubscriberService_CreateSubscriber
      parameters:
      - name: subscriberId
        in: query
        description: "Optional client-specified ID for the subscriber, used as the\n\
          \ `{subscriber}` segment of its resource name. The server assigns one when\n\
          \ omitted."
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subscriber'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscriber'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Subscriber
  /v1/subscribers/{subscriber}:
    get:
      tags:
      - Subscriber Service
      description: Gets a single subscriber.
      operationId: SubscriberService_GetSubscriber
      parameters:
      - name: subscriber
        in: path
        description: The subscriber id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscriber'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Subscriber
    delete:
      tags:
      - Subscriber Service
      description: Deletes a single subscriber.
      operationId: SubscriberService_DeleteSubscriber
      parameters:
      - name: subscriber
        in: path
        description: The subscriber id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Subscriber
    patch:
      tags:
      - Subscriber Service
      description: Updates a subscriber.
      operationId: SubscriberService_UpdateSubscriber
      parameters:
      - name: subscriber
        in: path
        description: The subscriber id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
