                details:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufAny'
                    description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
            description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
        TestCampaignRequest:
            required:
                - name
                - recipientEmails
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The campaign to send a test of.
                         Format: campaigns/{campaign}
                recipientEmails:
                    type: array
                    items:
                        type: string
                    description: Addresses to send the test message to.
            description: Request message for TestCampaign.
        TestCampaignResponse:
            type: object
            properties: {}
            description: Response message for TestCampaign.
        TransitionCampaignRequest:
            required:
                - name
                - transition
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The campaign whose lifecycle is changing.
                         Format: campaigns/{campaign}
                transition:
                    type: integer
                    description: |-
                        Transition to apply. Valid transitions: draft->schedule, draft/scheduled->
                         start, running->pause, paused->resume, running/paused->cancel.
                    format: enum
            description: Request message for TransitionCampaign.
tags:
