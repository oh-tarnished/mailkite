components:
    schemas:
        Campaign:
            required:
                - displayName
                - subject
                - format
                - lists
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The resource name of the campaign.
                         Format: campaigns/{campaign}
                uuid:
                    readOnly: true
                    type: string
                    description: Server-assigned stable UUID, used in tracking and public-archive URLs.
                displayName:
                    type: string
                    description: Internal campaign name (not shown to recipients).
                subject:
                    type: string
                    description: Email subject line. Supports template expressions.
                senderEmail:
                    type: string
                    description: Sender address. Falls back to the instance default when empty.
                type:
                    type: integer
                    description: Whether this is a regular broadcast or a double-opt-in confirmation send.
                    format: enum
                format:
                    type: integer
                    description: Format the body is authored in.
                    format: enum
                body:
                    type: string
                    description: The campaign body, in the format named by content_type.
                altBody:
                    type: string
                    description: Optional plain-text alternative body for multipart messages.
                lists:
                    type: array
                    items:
                        type: string
                    description: |-
                        Lists this campaign is sent to.
                         Format: mailingLists/{mailing_list}
                template:
                    type: string
                    description: |-
                        Template used to wrap the body.
                         Format: templates/{template}
                tags:
                    type: array
                    items:
                        type: string
                    description: Arbitrary tags for grouping and filtering.
                messenger:
                    type: string
                    description: Messenger backend to send through (defaults to "email").
                headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: Custom SMTP headers attached to every message.
                scheduleTime:
                    type: string
                    description: When to start sending. Omit to send immediately on start.
                    format: date-time
                state:
                    readOnly: true
                    type: integer
                    description: Current state of the campaign. Changed via TransitionCampaign.
                    format: enum
                archive:
                    type: boolean
                    description: Whether a public archive copy is published.
                archiveSlug:
                    type: string
                    description: URL slug for the public archive page.
                archiveTemplate:
                    type: string
                    description: |-
                        Template used to render the public archive page.
                         Format: templates/{template}
                archiveMeta:
                    type: object
                    description: Extra template data exposed to the public archive page.
                stats:
                    readOnly: true
                    allOf:
                        - $ref: '#/components/schemas/CampaignStats'
                    description: Aggregate delivery and engagement statistics.
                createTime:
                    readOnly: true
                    type: string
                    description: Creation timestamp.
                    format: date-time
                updateTime:
                    readOnly: true
                    type: string
                    description: Last-modification timestamp.
                    format: date-time
                startTime:
                    readOnly: true
                    type: string
                    description: When sending actually started, if at all.
                    format: date-time
            description: |-
                A single newsletter send: rendered content, its audience, and its lifecycle.
                 In mailkite a Campaign is the materialization of one scheduled digest of
                 normalized content items.
        CampaignRunningStat:
            type: object
            properties:
                campaign:
                    type: string
                    description: |-
                        The campaign these stats are for.
                         Format: campaigns/{campaign}
                state:
                    readOnly: true
                    type: integer
                    description: Current status.
                    format: enum
                stats:
                    allOf:
                        - $ref: '#/components/schemas/CampaignStats'
                    description: Counters.
                rate:
                    type: number
                    description: Send throughput in messages per minute.
                    format: double
                startTime:
                    type: string
                    description: When the send started.
                    format: date-time
            description: Live progress of a single running campaign.
        CampaignStats:
            type: object
            properties:
                recipientCount:
                    readOnly: true
                    type: string
                    description: Total recipients the campaign will be / was sent to.
                sent:
                    readOnly: true
                    type: string
                    description: Messages handed off to the messenger so far.
                views:
                    readOnly: true
                    type: string
                    description: Tracked opens.
                clicks:
                    readOnly: true
                    type: string
                    description: Tracked link clicks.
                bounces:
                    readOnly: true
                    type: string
                    description: Recorded bounces.
            description: Aggregate counters for a campaign.
        CollectCampaignStatsResponse:
            type: object
            properties:
