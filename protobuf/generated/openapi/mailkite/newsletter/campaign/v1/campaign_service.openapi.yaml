                    description: A token to retrieve the next page, or empty if this is the last page.
                totalSize:
                    type: integer
                    description: Total matching campaigns across all pages.
                    format: int32
            description: Response message for ListCampaigns.
        PreviewCampaignResponse:
            type: object
            properties:
                html:
