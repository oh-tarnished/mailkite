                Selects a set of subscribers either explicitly by name or by SQL query.
                 Exactly one of names or query should be supplied.
        Subscription:
            type: object
            properties:
                list:
                    readOnly: true
                    type: string
                    description: |-
                        The list this subscription is for.
                         Format: mailingLists/{mailing_list}
                listDisplayName:
                    readOnly: true
                    type: string
                    description: Cached display name of the list, for convenience.
                state:
                    readOnly: true
                    type: integer
                    description: Confirmation state of this specific membership.
                    format: enum
                createTime:
                    readOnly: true
                    type: string
                    description: When the subscriber joined this list.
                    format: date-time
            description: The membership of a subscriber in a single list.
tags:
