        ImportParams:
            required:
                - mode
            type: object
            properties:
                mode:
                    type: integer
                    description: Whether to only subscribe new records or also update existing ones.
                    format: enum
                lists:
                    type: array
                    items:
                        type: string
                    description: |-
                        Lists to subscribe all imported records to.
                         Format: mailingLists/{mailing_list}
                overwrite:
                    type: boolean
                    description: In upsert mode, whether to overwrite name/attributes of existing records.
                delimiter:
                    type: string
                    description: CSV column delimiter (defaults to ",").
                preconfirm:
                    type: boolean
                    description: |-
                        Mark imported memberships as confirmed, skipping any double-opt-in
                         confirmation email. When false, double-opt-in lists stay unconfirmed.
            description: Tunables for a bulk subscriber import.
        ImportStatus:
            type: object
            properties:
                state:
                    readOnly: true
                    type: integer
