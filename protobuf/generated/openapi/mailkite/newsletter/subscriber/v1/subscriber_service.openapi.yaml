            properties:
                status:
                    readOnly: true
                    allOf:
                        - $ref: '#/components/schemas/ImportStatus'
                    description: Status of the import after the stop request.
            description: Response message for StopImport.
        Subscriber:
            required:
                - email
                - displayName
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The resource name of the subscriber.
                         Format: subscribers/{subscriber}
                uuid:
                    readOnly: true
                    type: string
                    description: Server-assigned stable UUID.
                email:
                    type: string
                    description: Email address. Unique across all subscribers.
                displayName:
                    type: string
                    description: Display name of the subscriber.
                state:
                    readOnly: true
                    type: integer
                    description: |-
                        Global delivery state. A blocklisted subscriber receives nothing. Change it
                         with BlocklistSubscribers.
                    format: enum
                attributes:
                    type: object
                    description: |-
                        Arbitrary attributes used for templating and segmentation
                         (e.g. {"city": "Berlin", "plan": "pro"}).
                subscriptions:
                    readOnly: true
                    type: array
                    items:
                        $ref: '#/components/schemas/Subscription'
                    description: The lists this subscriber belongs to, with per-list status.
                createTime:
                    readOnly: true
                    type: string
                    description: Creation timestamp.
                    format: date-time
                updateTime:
                    readOnly: true
                    type: string
                    description: Last-modification timestamp.
                    format: date-time
            description: |-
                A person who can receive newsletters. Subscribers are global; their
                 relationship to each list is captured by a Subscription.
        SubscriberSelector:
            type: object
            properties:
                names:
                    type: array
                    items:
                        type: string
                    description: |-
                        Explicit subscribers to act on.
                         Format: subscribers/{subscriber}
                query:
                    type: string
                    description: A raw SQL-expression filter selecting subscribers to act on.
                lists:
                    type: array
                    items:
                        type: string
                    description: |-
                        Optional list scope the query is evaluated against.
                         Format: mailingLists/{mailing_list}
