paths:
    /v1/subscribers:
        get:
            tags:
                - SubscriberService
            description: Lists subscribers, optionally filtered by an advanced SQL query.
            operationId: SubscriberService_ListSubscribers
            parameters:
                - name: pageSize
                  in: query
                  description: |-
                    Maximum number of subscribers to return. The server may cap this. When
                     unset, the server picks a default.
                  schema:
                    type: integer
                    format: int32
                - name: pageToken
                  in: query
                  description: |-
                    A page token received from a previous ListSubscribers call. Provide this to
                     retrieve the subsequent page.
                  schema:
                    type: string
                - name: filter
                  in: query
                  description: |-
                    Filter expression restricting which subscribers are returned. Supports a
                     raw SQL-expression over subscriber columns and attributes (mirroring
                     Listmonk's advanced query box), plus `lists` membership and per-list
                     `subscription_state` predicates.
                  schema:
                    type: string
                - name: orderBy
                  in: query
                  description: |-
                    Comma-separated list of fields to sort by, each optionally suffixed with
                     ` desc` (e.g. `create_time desc`).
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
