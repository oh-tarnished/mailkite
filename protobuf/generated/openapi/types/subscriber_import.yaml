    mailkite.newsletter.subscriber.v1.ImportParams:
      description: Tunables for a bulk subscriber import.
      properties:
        delimiter:
          description: CSV column delimiter (defaults to ",").
          type: string
        lists:
          description: 'Lists to subscribe all imported records to. Format: mailingLists/{mailing_list}'
          items:
            type: string
          type: array
        mode:
          description: Whether to only subscribe new records or also update existing
            ones.
          enum:
          - IMPORT_MODE_UNSPECIFIED
          - IMPORT_MODE_SUBSCRIBE
          - IMPORT_MODE_UPSERT
          type: string
        overwrite:
          description: In upsert mode, whether to overwrite name/attributes of existing
            records.
          type: boolean
        preconfirm:
          description: Mark imported memberships as confirmed, skipping any double-opt-in
            confirmation email. When false, double-opt-in lists stay unconfirmed.
          type: boolean
      type: object
