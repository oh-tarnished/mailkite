          - CAMPAIGN_VIEW_BASIC
          - CAMPAIGN_VIEW_FULL
          type: string
      type: object
    mailkite.newsletter.campaign.v1.ListCampaignsRequest:
      description: Request message for ListCampaigns.
      properties:
        filter:
          description: Filter expression restricting which campaigns are returned.
            Supports free-text matching on `display_name`/`subject` and matching against
            `state` and `tags`, e.g. `state = CAMPAIGN_STATE_RUNNING`.
          type: string
        orderBy:
          description: Comma-separated list of fields to sort by, each optionally
            suffixed with ` desc` (e.g. `create_time desc`).
          type: string
        pageSize:
          description: Maximum number of campaigns to return. The server may cap this.
            When unset, the server picks a default.
          format: int32
          type: integer
        pageToken:
          description: A page token received from a previous ListCampaigns call. Provide
            this to retrieve the subsequent page.
          type: string
        view:
          description: How much of each campaign to return. BASIC omits the large
            body fields.
          enum:
          - CAMPAIGN_VIEW_UNSPECIFIED
          - CAMPAIGN_VIEW_BASIC
          - CAMPAIGN_VIEW_FULL
          type: string
      type: object
