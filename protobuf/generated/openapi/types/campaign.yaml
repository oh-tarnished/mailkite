components:
  schemas:
    mailkite.newsletter.campaign.v1.Campaign:
      description: 'A single newsletter send: rendered content, its audience, and
        its lifecycle. In mailkite a Campaign is the materialization of one scheduled
        digest of normalized content items.'
      properties:
        altBody:
          description: Optional plain-text alternative body for multipart messages.
          type: string
        archive:
          description: Whether a public archive copy is published.
          type: boolean
        archiveMeta:
          description: Extra template data exposed to the public archive page.
          type: object
          x-kubernetes-preserve-unknown-fields: true
        archiveSlug:
          description: URL slug for the public archive page.
          type: string
        archiveTemplate:
          description: 'Template used to render the public archive page. Format: templates/{template}'
          type: string
        body:
          description: The campaign body, in the format named by content_type.
          type: string
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        displayName:
          description: Internal campaign name (not shown to recipients).
          type: string
        format:
          description: Format the body is authored in.
          enum:
          - CONTENT_TYPE_UNSPECIFIED
          - CONTENT_TYPE_RICHTEXT
          - CONTENT_TYPE_HTML
          - CONTENT_TYPE_MARKDOWN
          - CONTENT_TYPE_PLAIN
          - CONTENT_TYPE_VISUAL
          type: string
        headers:
          additionalProperties:
            type: string
          description: Custom SMTP headers attached to every message.
          type: object
        lists:
          description: 'Lists this campaign is sent to. Format: mailingLists/{mailing_list}'
          items:
            type: string
          type: array
        messenger:
          description: Messenger backend to send through (defaults to "email").
          type: string
        name:
          description: 'The resource name of the campaign. Format: campaigns/{campaign}'
          type: string
        scheduleTime:
          description: When to start sending. Omit to send immediately on start.
          format: date-time
          type: string
        senderEmail:
          description: Sender address. Falls back to the instance default when empty.
          type: string
        startTime:
          description: When sending actually started, if at all.
          format: date-time
          type: string
        state:
          description: Current state of the campaign. Changed via TransitionCampaign.
          enum:
          - CAMPAIGN_STATE_UNSPECIFIED
          - CAMPAIGN_STATE_DRAFT
          - CAMPAIGN_STATE_SCHEDULED
          - CAMPAIGN_STATE_RUNNING
          - CAMPAIGN_STATE_PAUSED
          - CAMPAIGN_STATE_CANCELLED
          - CAMPAIGN_STATE_FINISHED
          type: string
        stats:
          description: Aggregate delivery and engagement statistics.
          properties:
            bounces:
              description: Recorded bounces.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            clicks:
              description: Tracked link clicks.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            recipientCount:
              description: Total recipients the campaign will be / was sent to.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            sent:
              description: Messages handed off to the messenger so far.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            views:
              description: Tracked opens.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        subject:
          description: Email subject line. Supports template expressions.
          type: string
        tags:
          description: Arbitrary tags for grouping and filtering.
          items:
            type: string
          type: array
        template:
          description: 'Template used to wrap the body. Format: templates/{template}'
          type: string
        type:
          description: Whether this is a regular broadcast or a double-opt-in confirmation
            send.
          enum:
          - CAMPAIGN_TYPE_UNSPECIFIED
          - CAMPAIGN_TYPE_REGULAR
          - CAMPAIGN_TYPE_OPTIN
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
        uuid:
          description: Server-assigned stable UUID, used in tracking and public-archive
            URLs.
          type: string
      type: object
    mailkite.newsletter.campaign.v1.CampaignStats:
      description: Aggregate counters for a campaign.
      properties:
        bounces:
          description: Recorded bounces.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
        clicks:
          description: Tracked link clicks.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
        recipientCount:
          description: Total recipients the campaign will be / was sent to.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
        sent:
          description: Messages handed off to the messenger so far.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
        views:
          description: Tracked opens.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
