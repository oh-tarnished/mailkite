components:
  schemas:
    mailkite.newsletter.subscriber.v1.CreateSubscriberRequest:
      description: Request message for CreateSubscriber.
      properties:
        subscriber:
          description: The subscriber to create. The name and subscriptions fields
            are ignored. Manage list memberships with ManageSubscriberLists.
          properties:
            attributes:
              description: 'Arbitrary attributes used for templating and segmentation
                (e.g. {"city": "Berlin", "plan": "pro"}).'
              type: object
              x-kubernetes-preserve-unknown-fields: true
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            displayName:
              description: Display name of the subscriber.
              type: string
            email:
              description: Email address. Unique across all subscribers.
              type: string
            name:
              description: 'The resource name of the subscriber. Format: subscribers/{subscriber}'
              type: string
            state:
              description: Global delivery state. A blocklisted subscriber receives
                nothing. Change it with BlocklistSubscribers.
              enum:
              - SUBSCRIBER_STATE_UNSPECIFIED
              - SUBSCRIBER_STATE_ENABLED
              - SUBSCRIBER_STATE_BLOCKLISTED
              type: string
            subscriptions:
              description: The lists this subscriber belongs to, with per-list status.
              items:
                description: The membership of a subscriber in a single list.
                properties:
                  createTime:
                    description: When the subscriber joined this list.
                    format: date-time
                    type: string
                  list:
                    description: 'The list this subscription is for. Format: mailingLists/{mailing_list}'
                    type: string
                  listDisplayName:
                    description: Cached display name of the list, for convenience.
                    type: string
                  state:
                    description: Confirmation state of this specific membership.
                    enum:
                    - SUBSCRIPTION_STATE_UNSPECIFIED
                    - SUBSCRIPTION_STATE_UNCONFIRMED
                    - SUBSCRIPTION_STATE_CONFIRMED
                    - SUBSCRIPTION_STATE_UNSUBSCRIBED
                    type: string
                type: object
              type: array
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            uuid:
              description: Server-assigned stable UUID.
              type: string
          type: object
        subscriberId:
          description: Optional client-specified ID for the subscriber, used as the
            `{subscriber}` segment of its resource name. The server assigns one when
            omitted.
          type: string
      type: object
    mailkite.newsletter.subscriber.v1.DeleteSubscriberRequest:
      description: Request message for DeleteSubscriber.
      properties:
        name:
          description: 'The subscriber to delete. Format: subscribers/{subscriber}'
          type: string
      type: object
    mailkite.newsletter.subscriber.v1.GetSubscriberRequest:
      description: Request message for GetSubscriber.
      properties:
        name:
          description: 'The subscriber to retrieve. Format: subscribers/{subscriber}'
          type: string
      type: object
    mailkite.newsletter.subscriber.v1.ListSubscribersRequest:
      description: Request message for ListSubscribers.
      properties:
        filter:
          description: Filter expression restricting which subscribers are returned.
            Supports a raw SQL-expression over subscriber columns and attributes (mirroring
            Listmonk's advanced query box), plus `lists` membership and per-list `subscription_state`
            predicates.
          type: string
        orderBy:
          description: Comma-separated list of fields to sort by, each optionally
            suffixed with ` desc` (e.g. `create_time desc`).
          type: string
        pageSize:
          description: Maximum number of subscribers to return. The server may cap
            this. When unset, the server picks a default.
          format: int32
          type: integer
        pageToken:
          description: A page token received from a previous ListSubscribers call.
            Provide this to retrieve the subsequent page.
          type: string
      type: object
    mailkite.newsletter.subscriber.v1.ListSubscribersResponse:
      description: Response message for ListSubscribers.
      properties:
        nextPageToken:
          description: A token to retrieve the next page, or empty if this is the
            last page.
          type: string
        subscribers:
          description: The page of subscribers.
          items:
            description: A person who can receive newsletters. Subscribers are global;
              their relationship to each list is captured by a Subscription.
            properties:
              attributes:
                description: 'Arbitrary attributes used for templating and segmentation
                  (e.g. {"city": "Berlin", "plan": "pro"}).'
                type: object
                x-kubernetes-preserve-unknown-fields: true
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              displayName:
                description: Display name of the subscriber.
                type: string
              email:
                description: Email address. Unique across all subscribers.
                type: string
              name:
                description: 'The resource name of the subscriber. Format: subscribers/{subscriber}'
                type: string
              state:
                description: Global delivery state. A blocklisted subscriber receives
                  nothing. Change it with BlocklistSubscribers.
                enum:
                - SUBSCRIBER_STATE_UNSPECIFIED
                - SUBSCRIBER_STATE_ENABLED
                - SUBSCRIBER_STATE_BLOCKLISTED
                type: string
              subscriptions:
                description: The lists this subscriber belongs to, with per-list status.
                items:
                  description: The membership of a subscriber in a single list.
                  properties:
                    createTime:
                      description: When the subscriber joined this list.
                      format: date-time
                      type: string
                    list:
                      description: 'The list this subscription is for. Format: mailingLists/{mailing_list}'
                      type: string
                    listDisplayName:
                      description: Cached display name of the list, for convenience.
                      type: string
                    state:
                      description: Confirmation state of this specific membership.
                      enum:
                      - SUBSCRIPTION_STATE_UNSPECIFIED
                      - SUBSCRIPTION_STATE_UNCONFIRMED
                      - SUBSCRIPTION_STATE_CONFIRMED
                      - SUBSCRIPTION_STATE_UNSUBSCRIBED
                      type: string
                  type: object
                type: array
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
              uuid:
                description: Server-assigned stable UUID.
                type: string
            type: object
          type: array
        totalSize:
          description: Total matching subscribers across all pages.
          format: int32
          type: integer
      type: object
    mailkite.newsletter.subscriber.v1.UpdateSubscriberRequest:
      description: Request message for UpdateSubscriber.
      properties:
        subscriber:
          description: The subscriber to update; its name identifies the target. List
            memberships are managed separately with ManageSubscriberLists.
          properties:
            attributes:
              description: 'Arbitrary attributes used for templating and segmentation
                (e.g. {"city": "Berlin", "plan": "pro"}).'
              type: object
              x-kubernetes-preserve-unknown-fields: true
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            displayName:
              description: Display name of the subscriber.
              type: string
            email:
              description: Email address. Unique across all subscribers.
              type: string
            name:
              description: 'The resource name of the subscriber. Format: subscribers/{subscriber}'
              type: string
            state:
              description: Global delivery state. A blocklisted subscriber receives
                nothing. Change it with BlocklistSubscribers.
              enum:
              - SUBSCRIBER_STATE_UNSPECIFIED
              - SUBSCRIBER_STATE_ENABLED
              - SUBSCRIBER_STATE_BLOCKLISTED
              type: string
            subscriptions:
              description: The lists this subscriber belongs to, with per-list status.
              items:
                description: The membership of a subscriber in a single list.
                properties:
                  createTime:
                    description: When the subscriber joined this list.
                    format: date-time
                    type: string
                  list:
                    description: 'The list this subscription is for. Format: mailingLists/{mailing_list}'
                    type: string
                  listDisplayName:
                    description: Cached display name of the list, for convenience.
                    type: string
                  state:
                    description: Confirmation state of this specific membership.
                    enum:
                    - SUBSCRIPTION_STATE_UNSPECIFIED
                    - SUBSCRIPTION_STATE_UNCONFIRMED
                    - SUBSCRIPTION_STATE_CONFIRMED
                    - SUBSCRIPTION_STATE_UNSUBSCRIBED
                    type: string
                type: object
              type: array
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            uuid:
              description: Server-assigned stable UUID.
              type: string
          type: object
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable fields.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
      type: object
