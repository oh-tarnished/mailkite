          description: The subscribers to blocklist.
          properties:
            lists:
              description: 'Optional list scope the query is evaluated against. Format:
                mailingLists/{mailing_list}'
              items:
                type: string
              type: array
            names:
              description: 'Explicit subscribers to act on. Format: subscribers/{subscriber}'
              items:
                type: string
              type: array
