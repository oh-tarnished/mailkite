syntax = "proto3";

package mailkite.newsletter.template.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oh-tarnished/mailkite/protobuf/generated/go/newsletter/template/v1/templatepbv1;templatepbv1";
option java_multiple_files = true;
option java_outer_classname = "TemplateProto";
option java_package = "dev.ohtarnished.mailkite.newsletter.template.v1";

// A reusable layout (HTML/markdown wrapper) applied to campaigns or
// transactional messages.
message Template {
  option (google.api.resource) = {
    type: "mailkite.newsletter.v1/Template"
    pattern: "templates/{template}"
    singular: "template"
    plural: "templates"
  };

  // The resource name of the template.
  // Format: templates/{template}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Human-friendly template name.
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];

  // What the template can be applied to.
  TemplateType type = 3 [(google.api.field_behavior) = REQUIRED];

  // Default subject for transactional templates. Ignored for campaign
  // templates, which take their subject from the campaign.
  string subject = 4 [(google.api.field_behavior) = OPTIONAL];

  // The template markup. Campaign templates must contain the
  // {{ template "content" . }} directive.
  string body = 5 [(google.api.field_behavior) = REQUIRED];

  // Whether this is the default template for its type. Set via
  // MarkDefaultTemplate.
  bool is_default = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for ListTemplates.
message ListTemplatesRequest {
  // Maximum number of templates to return. The server may cap this. When unset,
  // the server picks a default.
  int32 page_size = 1 [(google.api.field_behavior) = OPTIONAL];

  // A page token received from a previous ListTemplates call. Provide this to
  // retrieve the subsequent page.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression restricting which templates are returned. Supports
  // matching against `type`, e.g. `type = TEMPLATE_TYPE_CAMPAIGN`.
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // How much of each template to return. BASIC omits the body field.
  TemplateView view = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListTemplates.
message ListTemplatesResponse {
  // The page of templates.
  repeated Template templates = 1;

  // A token to retrieve the next page, or empty if this is the last page.
  string next_page_token = 2;
}

// Request message for GetTemplate.
message GetTemplateRequest {
  // The template to retrieve.
  // Format: templates/{template}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "mailkite.newsletter.v1/Template"}
  ];

  // How much of the template to return. BASIC omits the body field.
  TemplateView view = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for CreateTemplate.
message CreateTemplateRequest {
  // The template to create. The name field is ignored.
  Template template = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional client-specified ID for the template, used as the `{template}`
  // segment of its resource name. The server assigns one when omitted.
  string template_id = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for UpdateTemplate.
message UpdateTemplateRequest {
  // The template to update; its name identifies the target.
  Template template = 1 [(google.api.field_behavior) = REQUIRED];

  // Fields to overwrite. Omit to replace all mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteTemplate.
message DeleteTemplateRequest {
  // The template to delete.
  // Format: templates/{template}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "mailkite.newsletter.v1/Template"}
  ];
}

// Request message for MarkDefaultTemplate.
message MarkDefaultTemplateRequest {
  // The template to mark as the default for its type.
  // Format: templates/{template}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "mailkite.newsletter.v1/Template"}
  ];
}

// What a template can be applied to.
enum TemplateType {
  // Unset.
  TEMPLATE_TYPE_UNSPECIFIED = 0;

  // Wraps regular campaigns.
  TEMPLATE_TYPE_CAMPAIGN = 1;

  // Wraps campaigns authored in the visual editor.
  TEMPLATE_TYPE_CAMPAIGN_VISUAL = 2;

  // Wraps transactional messages.
  TEMPLATE_TYPE_TRANSACTIONAL = 3;
}

// Controls how much of a template is returned by read methods.
enum TemplateView {
  // Default; equivalent to TEMPLATE_VIEW_FULL.
  TEMPLATE_VIEW_UNSPECIFIED = 0;

  // Omits the body field.
  TEMPLATE_VIEW_BASIC = 1;

  // Returns the full template, including body.
  TEMPLATE_VIEW_FULL = 2;
}
