syntax = "proto3";

package mailkite.newsletter.subscriber.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "mailkite/newsletter/subscriber/v1/enums.proto";

option go_package = "github.com/oh-tarnished/mailkite/protobuf/generated/go/newsletter/subscriber/v1/subscriberpbv1;subscriberpbv1";
option java_multiple_files = true;
option java_outer_classname = "SubscriberImportProto";
option java_package = "dev.ohtarnished.mailkite.newsletter.subscriber.v1";

// Tunables for a bulk subscriber import.
message ImportParams {
  // Whether to only subscribe new records or also update existing ones.
  ImportMode mode = 1 [(google.api.field_behavior) = REQUIRED];

  // Lists to subscribe all imported records to.
  // Format: mailingLists/{mailing_list}
  repeated string lists = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "mailkite.newsletter.v1/MailingList"}
  ];

  // In upsert mode, whether to overwrite name/attributes of existing records.
  bool overwrite = 3 [(google.api.field_behavior) = OPTIONAL];

  // CSV column delimiter (defaults to ",").
  string delimiter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Mark imported memberships as confirmed, skipping any double-opt-in
  // confirmation email. When false, double-opt-in lists stay unconfirmed.
  bool preconfirm = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for ImportSubscribers.
message ImportSubscribersRequest {
  // Import configuration.
  ImportParams params = 1 [(google.api.field_behavior) = REQUIRED];

  // Raw contents of a CSV file, or a ZIP archive containing one CSV.
  bytes file = 2 [(google.api.field_behavior) = REQUIRED];
}

// Response message for ImportSubscribers.
message ImportSubscribersResponse {
  // Status of the import that was started.
  ImportStatus status = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for CheckImportStatus.
message CheckImportStatusRequest {}

// Response message for CheckImportStatus.
message CheckImportStatusResponse {
  // Status of the current or most recent import.
  ImportStatus status = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for StopImport.
message StopImportRequest {}

// Response message for StopImport.
message StopImportResponse {
  // Status of the import after the stop request.
  ImportStatus status = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Snapshot of the single in-flight or most recent import.
message ImportStatus {
  // Current state of the import worker.
  ImportState state = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Records imported so far.
  int64 imported = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Total records detected in the source file.
  int64 total = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable log lines emitted by the importer.
  repeated string logs = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}
