syntax = "proto3";

package mailkite.newsletter.subscriber.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "mailkite/newsletter/subscriber/v1/subscriber.proto";
import "mailkite/newsletter/subscriber/v1/subscriber_bulk.proto";
import "mailkite/newsletter/subscriber/v1/subscriber_import.proto";
import "mailkite/newsletter/subscriber/v1/subscriber_messages.proto";
import "mcp/protobuf/annotations.proto";

option go_package = "github.com/oh-tarnished/mailkite/protobuf/generated/go/newsletter/subscriber/v1/subscriberpbv1;subscriberpbv1";
option java_multiple_files = true;
option java_outer_classname = "SubscriberServiceProto";
option java_package = "dev.ohtarnished.mailkite.newsletter.subscriber.v1";

// SubscriberService manages newsletter subscribers, their list memberships,
// bulk audience operations, and CSV imports.
service SubscriberService {
  option (google.api.default_host) = "oh-tarnished.mailkite.newsletter.v1";
  option (mcp.protobuf.service) = {
    app: {
      name: "Newsletter Subscribers"
      version: "1.0.0"
      description: "Manage newsletter subscribers, list memberships, blocklisting, and bulk import."
    }
  };

  // Lists subscribers, optionally filtered by an advanced SQL query.
  rpc ListSubscribers(ListSubscribersRequest) returns (ListSubscribersResponse) {
    option (google.api.http) = {get: "/v1/subscribers"};
    option (mcp.protobuf.tool) = {description: "List subscribers. Filter by list membership, subscription status, or a raw SQL expression over columns and attributes."};
  }

  // Gets a single subscriber.
  rpc GetSubscriber(GetSubscriberRequest) returns (Subscriber) {
    option (google.api.http) = {get: "/v1/{name=subscribers/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.protobuf.tool) = {description: "Get a single subscriber by resource name, including subscriptions and attributes."};
  }

  // Creates a subscriber.
  rpc CreateSubscriber(CreateSubscriberRequest) returns (Subscriber) {
    option (google.api.http) = {
      post: "/v1/subscribers"
      body: "subscriber"
    };
    option (google.api.method_signature) = "subscriber,subscriber_id";
    option (mcp.protobuf.tool) = {description: "Create a subscriber from an email and name. Manage list memberships separately with ManageSubscriberLists."};
    option (mcp.protobuf.prompt) = {
      name: "subscribe_email"
      description: "Subscribe an email address to a mailing list"
      schema: "mailkite.newsletter.subscriber.v1.SubscribeEmailArgs"
    };
  }

  // Updates a subscriber.
  rpc UpdateSubscriber(UpdateSubscriberRequest) returns (Subscriber) {
    option (google.api.http) = {
      patch: "/v1/{subscriber.name=subscribers/*}"
      body: "subscriber"
    };
    option (google.api.method_signature) = "subscriber,update_mask";
    option (mcp.protobuf.tool) = {description: "Update a subscriber's email, name, or attributes. Manage list memberships with ManageSubscriberLists."};
  }

  // Deletes a single subscriber.
  rpc DeleteSubscriber(DeleteSubscriberRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=subscribers/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.protobuf.tool) = {description: "Permanently delete a single subscriber by resource name."};
  }

  // Deletes subscribers in bulk by explicit name or query.
  rpc BulkDeleteSubscribers(BulkDeleteSubscribersRequest) returns (BulkDeleteSubscribersResponse) {
    option (google.api.http) = {
      post: "/v1/subscribers:bulkDelete"
      body: "*"
    };
    option (mcp.protobuf.tool) = {description: "Permanently delete many subscribers at once, selected by explicit names or a SQL query."};
  }

  // Blocklists subscribers in bulk.
  rpc BlocklistSubscribers(BlocklistSubscribersRequest) returns (BlocklistSubscribersResponse) {
    option (google.api.http) = {
      post: "/v1/subscribers:blocklist"
      body: "*"
    };
    option (mcp.protobuf.tool) = {description: "Blocklist a set of subscribers (suppress all future mail), selected by names or a SQL query."};
  }

  // Adds, removes, or unsubscribes a set of subscribers across lists.
  rpc ManageSubscriberLists(ManageSubscriberListsRequest) returns (ManageSubscriberListsResponse) {
    option (google.api.http) = {
      post: "/v1/subscribers:manageSubscriberLists"
      body: "*"
    };
    option (mcp.protobuf.tool) = {description: "Bulk add, remove, or unsubscribe a set of subscribers across one or more lists. Select by names or a SQL query."};
  }

  // Starts a bulk subscriber import from a CSV/ZIP file.
  rpc ImportSubscribers(ImportSubscribersRequest) returns (ImportSubscribersResponse) {
    option (google.api.http) = {
      post: "/v1/subscribers:import"
      body: "*"
    };
    option (mcp.protobuf.tool) = {description: "Start a bulk subscriber import from a CSV (or ZIP) file. Only one import runs at a time."};
  }

  // Returns the status of the running or most recent import.
  rpc CheckImportStatus(CheckImportStatusRequest) returns (CheckImportStatusResponse) {
    option (google.api.http) = {get: "/v1/subscribers:checkImportStatus"};
    option (mcp.protobuf.tool) = {description: "Get the progress and logs of the current or most recent subscriber import."};
  }

  // Stops the running import.
  rpc StopImport(StopImportRequest) returns (StopImportResponse) {
    option (google.api.http) = {
      post: "/v1/subscribers:stopImport"
      body: "*"
    };
    option (mcp.protobuf.tool) = {description: "Stop the currently running subscriber import."};
  }
}
