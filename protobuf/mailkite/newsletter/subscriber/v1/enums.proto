syntax = "proto3";

package mailkite.newsletter.subscriber.v1;

option go_package = "github.com/oh-tarnished/mailkite/protobuf/generated/go/newsletter/subscriber/v1/subscriberpbv1;subscriberpbv1";
option java_multiple_files = true;
option java_outer_classname = "EnumsProto";
option java_package = "dev.ohtarnished.mailkite.newsletter.subscriber.v1";

// Action applied by ManageSubscriberLists.
enum SubscriberListAction {
  // Unset.
  SUBSCRIBER_LIST_ACTION_UNSPECIFIED = 0;

  // Add the subscribers to the listed lists.
  SUBSCRIBER_LIST_ACTION_ADD = 1;

  // Remove the memberships entirely.
  SUBSCRIBER_LIST_ACTION_REMOVE = 2;

  // Keep the memberships but mark them unsubscribed.
  SUBSCRIBER_LIST_ACTION_UNSUBSCRIBE = 3;
}

// Behavior of a subscriber import.
enum ImportMode {
  // Unset.
  IMPORT_MODE_UNSPECIFIED = 0;

  // Only insert new subscribers; skip existing.
  IMPORT_MODE_SUBSCRIBE = 1;

  // Insert new and update existing subscribers.
  IMPORT_MODE_UPSERT = 2;
}

// State of the import worker.
enum ImportState {
  // No import has run.
  IMPORT_STATE_UNSPECIFIED = 0;

  // Import in progress.
  IMPORT_STATE_IMPORTING = 1;

  // Stop requested, winding down.
  IMPORT_STATE_STOPPING = 2;

  // Completed successfully.
  IMPORT_STATE_DONE = 3;

  // Aborted with errors.
  IMPORT_STATE_FAILED = 4;
}

// Global delivery status of a subscriber.
enum SubscriberState {
  // Unset.
  SUBSCRIBER_STATE_UNSPECIFIED = 0;

  // Eligible to receive mail.
  SUBSCRIBER_STATE_ENABLED = 1;

  // Suppressed across all lists.
  SUBSCRIBER_STATE_BLOCKLISTED = 2;
}

// Confirmation status of a membership in a specific list.
enum SubscriptionState {
  // Unset / any.
  SUBSCRIPTION_STATE_UNSPECIFIED = 0;

  // Awaiting double-opt-in confirmation.
  SUBSCRIPTION_STATE_UNCONFIRMED = 1;

  // Confirmed and active.
  SUBSCRIPTION_STATE_CONFIRMED = 2;

  // Opted out of this list.
  SUBSCRIPTION_STATE_UNSUBSCRIBED = 3;
}
